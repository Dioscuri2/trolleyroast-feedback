    <meta property="og:title" content="TrolleyRoast — Scan your receipt. See where you'd save." />
    <meta property="og:description" content="Whole-basket supermarket comparison powered by receipt-led evidence. Free, instant, and built for real UK shoppers." />

    <meta name="twitter:title" content="TrolleyRoast — Scan your receipt. See where you'd save." />

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "WebSite",
          "@id": "https://trolleyroast.co.uk/#website",
          "url": "https://trolleyroast.co.uk",
          "name": "TrolleyRoast",
          "description": "Whole-basket UK supermarket price comparison powered by receipt scanning.",
          "inLanguage": "en-GB",
          "potentialAction": {
            "@type": "SearchAction",
            "target": {
              "@type": "EntryPoint",
              "urlTemplate": "https://trolleyroast.co.uk/compare?q={search_term_string}"
            },
            "query-input": "required name=search_term_string"
          }
        },
        {
          "@type": "Organization",
          "@id": "https://trolleyroast.co.uk/#organization",
          "name": "TrolleyRoast",
          "url": "https://trolleyroast.co.uk",
          "logo": {
            "@type": "ImageObject",
            "url": "https://trolleyroast.co.uk/og-default.png"
          },
          "sameAs": []
        }
      ]
    }
    </script>
